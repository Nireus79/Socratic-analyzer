name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
        continue-on-error: true

      - name: Format check with black
        run: |
          black --check src/ tests/
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy src/socratic_analyzer --strict
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=src/socratic_analyzer --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code quality
        run: |
          # Check minimum test coverage
          pytest tests/ --cov=src/socratic_analyzer --cov-fail-under=85 --quiet

      - name: Security scan with bandit
        run: |
          bandit -r src/socratic_analyzer -f json -o bandit-report.json
        continue-on-error: true
